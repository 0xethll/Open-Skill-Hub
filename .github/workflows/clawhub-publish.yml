name: Clawhub Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clawhub CLI
        run: npm i -g clawhub

      - name: Publish changed skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          chmod +x scripts/clawhub-publish.sh
          scripts/clawhub-publish.sh
